<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL RPG v2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>TERMINAL ENGINE v2.0</h1>

    <div id="game-container">
        <div id="world">
            <div id="player"></div>
        </div>
    </div>

    <div id="stats-fenster">
        <div class="stat-group">
            <strong>Health</strong>
            <div class="bar-container"><div id="hp-bar" class="bar hp"></div></div>
        </div>
        <div class="stat-group">
            <strong>Mana</strong>
            <div class="bar-container"><div id="mana-bar" class="bar mana"></div></div>
        </div>
    </div>

    <div id="game-log">> System online. Nutze WASD zum Bewegen.</div>

    <script src="storage.js"></script>
    <script src="player.js"></script>
    <script src="engine.js"></script>
</body>
</html>
