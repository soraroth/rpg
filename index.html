<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fachinformatiker RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>TERMINAL RPG v1.0</h1>

    <div id="stats-fenster">
        <div class="stat-group">
            <strong>Health Points</strong>
            <span id="hp-wert">100</span>
            <div class="bar-container"><div id="hp-bar" class="bar hp"></div></div>
        </div>
        <div class="stat-group">
            <strong>Mana / Energy</strong>
            <span id="mana-wert">50</span>
            <div class="bar-container"><div id="mana-bar" class="bar mana"></div></div>
        </div>
        <div class="stat-group">
            <strong>Experience (Level <span id="level-wert">1</span>)</strong>
            <span><span id="xp-wert">0</span> / <span id="xp-ziel">100</span></span>
            <div class="bar-container"><div id="xp-bar" class="bar xp"></div></div>
        </div>
        <div class="stat-group">
            <strong>Daily Goals</strong>
            <span>Wasser: <span id="wasser-wert">0</span> ml</span>
            <span>ZP-Countdown: <span id="countdown-wert">?</span> Tage</span>
        </div>
    </div>

    <div id="game-log">> System bereit. Warte auf Input...</div>

    <h3>Quests & Actions</h3>
    <div class="button-group" style="position: relative; padding: 20px;">
        <canvas id="wasser-canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3;"></canvas>
        <button onclick="trinkeWasser(250)">TRINKE H2O (250ml)</button>
        <button onclick="trinkeWasser(500)">TRINKE H2O (500ml)</button>
    </div>

    <div class="button-group">
        <button onclick="lerne(20, 15)">CODE SQL (+20 XP)</button>
        <button onclick="lerne(50, 35)">DEPLOY PROJECT (+50 XP)</button>
    </div>

    <div class="button-group">
        <button onclick="zocken(40)">REBOOT SYSTEM (+40 Mana)</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
